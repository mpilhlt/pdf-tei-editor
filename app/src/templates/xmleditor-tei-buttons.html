<!-- XML Editor TEI action buttons -->
<status-separator variant="vertical"></status-separator>

<sl-tooltip content="Validate the document">
  <status-button
    name="validateBtn"
    icon="file-earmark-check"
    tooltip="Validate the document"
    action="xml-validate">
  </status-button>
</sl-tooltip>

<sl-tooltip content="Undo">
  <status-button
    name="undoBtn"
    icon="arrow-counterclockwise"
    tooltip="Undo"
    action="xml-undo">
  </status-button>
</sl-tooltip>

<sl-tooltip content="Redo">
  <status-button
    name="redoBtn"
    icon="arrow-clockwise"
    tooltip="Redo"
    action="xml-redo">
  </status-button>
</sl-tooltip>
